<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LAN9662 Board Configuration</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #fafafa;
      --card: #ffffff;
      --border: rgba(0,0,0,.06);
      --border-hi: rgba(0,0,0,.1);
      --text: #1d1d1f;
      --text2: #6e6e73;
      --text3: #aeaeb2;
      --accent: #0071e3;
      --green: #34c759;
      --orange: #ff9500;
      --red: #ff3b30;
      --radius: 20px;
      --shadow: 0 2px 12px rgba(0,0,0,.04), 0 0.5px 1px rgba(0,0,0,.06);
      --shadow-lg: 0 8px 40px rgba(0,0,0,.06), 0 1px 3px rgba(0,0,0,.04);
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .wrap {
      max-width: 960px;
      margin: 0 auto;
      padding: 48px 24px 80px;
    }

    /* ── Header ── */
    .header {
      text-align: center;
      margin-bottom: 48px;
    }
    .header .logo {
      height: 28px;
      margin-bottom: 20px;
      opacity: .6;
    }
    .header h1 {
      font-size: 2.8rem;
      font-weight: 800;
      letter-spacing: -0.035em;
      line-height: 1.1;
      color: var(--text);
    }
    .header .sub {
      font-size: 1.05rem;
      font-weight: 400;
      color: var(--text2);
      margin-top: 10px;
      letter-spacing: -0.01em;
    }
    .header .chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 16px;
      padding: 6px 16px;
      border-radius: 100px;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: -0.01em;
    }
    .chip-ok { background: rgba(52,199,89,.1); color: #248a3d; }
    .chip-err { background: rgba(255,59,48,.08); color: var(--red); }
    .chip .dot {
      width: 7px; height: 7px; border-radius: 50%;
    }
    .chip-ok .dot { background: var(--green); }
    .chip-err .dot { background: var(--red); }

    /* ── Action bar ── */
    .action-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      flex-wrap: wrap;
      gap: 12px;
    }
    .read-time {
      font-size: 0.82rem;
      color: var(--text3);
      font-weight: 500;
    }
    .btn {
      border: none;
      border-radius: 100px;
      padding: 12px 28px;
      font-weight: 600;
      font-size: 0.88rem;
      cursor: pointer;
      transition: all .2s;
      letter-spacing: -0.01em;
    }
    .btn-primary {
      background: var(--text);
      color: #fff;
    }
    .btn-primary:hover {
      background: #333;
      transform: scale(1.02);
    }
    .btn-primary:disabled {
      opacity: .3;
      cursor: not-allowed;
      transform: none;
    }

    /* ── Loading ── */
    .loading-msg {
      text-align: center;
      padding: 100px 20px;
      color: var(--text2);
      font-size: 0.95rem;
      font-weight: 500;
    }
    .spinner-ring {
      display: inline-block;
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--text);
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin-bottom: 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Port Card ── */
    .port-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
      margin-bottom: 20px;
      box-shadow: var(--shadow);
      transition: box-shadow .3s;
    }
    .port-card:hover {
      box-shadow: var(--shadow-lg);
    }

    .port-top {
      display: flex;
      align-items: flex-start;
      gap: 20px;
      margin-bottom: 28px;
    }
    .port-icon {
      width: 56px; height: 56px;
      border-radius: 16px;
      background: linear-gradient(135deg, #f5f5f7, #e8e8ed);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem; font-weight: 800; color: var(--text);
      flex-shrink: 0;
    }
    .port-info { flex: 1; }
    .port-info h2 {
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text);
    }
    .port-meta-row {
      display: flex;
      gap: 20px;
      margin-top: 6px;
      flex-wrap: wrap;
    }
    .port-meta-item {
      font-size: 0.8rem;
      color: var(--text3);
      font-weight: 500;
    }
    .port-meta-item strong {
      color: var(--text2);
      font-weight: 600;
    }
    .port-tags {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }
    .tag {
      padding: 5px 12px;
      border-radius: 8px;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.01em;
    }
    .tag-ok { background: rgba(52,199,89,.08); color: #248a3d; }
    .tag-warn { background: rgba(255,149,0,.1); color: #c77c00; }
    .tag-off { background: rgba(255,59,48,.08); color: var(--red); }

    /* ── Metrics strip ── */
    .metrics-strip {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 1px;
      background: var(--border);
      border-radius: 14px;
      overflow: hidden;
      margin-bottom: 24px;
    }
    .metric {
      background: var(--card);
      padding: 18px 20px;
      text-align: center;
    }
    .metric-val {
      font-size: 1.5rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      color: var(--text);
    }
    .metric-label {
      font-size: 0.68rem;
      font-weight: 600;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-top: 2px;
    }

    /* ── GCL Table ── */
    .section-title {
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 12px;
    }
    .gcl-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.82rem;
    }
    .gcl-table th {
      text-align: left;
      padding: 10px 12px;
      font-weight: 600;
      font-size: 0.7rem;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border-bottom: 2px solid var(--border);
    }
    .gcl-table td {
      padding: 12px 12px;
      border-bottom: 1px solid var(--border);
      font-variant-numeric: tabular-nums;
      color: var(--text);
    }
    .gcl-table tr:last-child td { border-bottom: none; }
    .gcl-table tr:hover td { background: rgba(0,0,0,.015); }

    /* ── Gate bits ── */
    .gate-bits {
      display: inline-flex;
      gap: 3px;
    }
    .gate-bit {
      width: 18px; height: 18px;
      border-radius: 4px;
      display: inline-flex;
      align-items: center; justify-content: center;
      font-size: 8px; font-weight: 700;
      transition: transform .15s;
    }
    .gate-bit:hover { transform: scale(1.2); }
    .gate-bit.on {
      color: #fff;
      box-shadow: 0 1px 3px rgba(0,0,0,.15);
    }
    .gate-bit.off {
      background: #f0f0f2;
      color: #c7c7cc;
    }

    /* ── Gantt timeline ── */
    .gantt-section {
      margin-top: 24px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
    }
    .gantt-svg {
      width: 100%;
      overflow: visible;
      border-radius: 12px;
    }

    /* ── TC legend ── */
    .tc-legend {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      margin-top: 12px;
    }
    .tc-legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--text2);
    }
    .tc-legend-dot {
      width: 10px; height: 10px;
      border-radius: 3px;
    }

    /* ── Empty / Error ── */
    .empty-state {
      text-align: center;
      padding: 100px 20px;
    }
    .empty-state h2 {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text2);
      margin-bottom: 8px;
    }
    .empty-state p {
      font-size: 0.95rem;
      color: var(--text3);
      line-height: 1.7;
    }
    .empty-state a { color: var(--accent); text-decoration: none; font-weight: 600; }
    .empty-state a:hover { text-decoration: underline; }

    /* ── Nav ── */
    .nav-bar {
      display: flex;
      gap: 12px;
      margin-top: 40px;
      justify-content: center;
    }
    .nav-bar a {
      color: var(--text2);
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 600;
      padding: 10px 20px;
      border-radius: 100px;
      border: 1px solid var(--border);
      transition: all .2s;
    }
    .nav-bar a:hover {
      border-color: var(--text);
      color: var(--text);
    }

    .error-card {
      background: rgba(255,59,48,.04);
      border: 1px solid rgba(255,59,48,.12);
      border-radius: var(--radius);
      padding: 24px 32px;
      color: var(--red);
      font-weight: 500;
    }

    /* Responsive */
    @media (max-width: 600px) {
      .header h1 { font-size: 2rem; }
      .port-card { padding: 20px; }
      .port-top { flex-direction: column; gap: 12px; }
      .metrics-strip { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="header">
      <img src="keti.png" alt="KETI" class="logo" onerror="this.style.display='none'">
      <h1>LAN9662</h1>
      <p class="sub">IEEE 802.1Qbv Time-Aware Shaper Configuration</p>
      <div id="statusChip" class="chip chip-err">
        <span class="dot"></span>
        <span id="statusText">Connecting...</span>
      </div>
    </header>

    <!-- Action bar -->
    <div class="action-bar">
      <span class="read-time" id="readTime"></span>
      <button class="btn btn-primary" id="btnRead" disabled onclick="readBoard()">
        Read from Board
      </button>
    </div>

    <!-- Port cards -->
    <div id="portsContainer">
      <div class="loading-msg">
        <div class="spinner-ring"></div><br>
        Connecting to board...
      </div>
    </div>

    <!-- Navigation -->
    <div class="nav-bar">
      <a href="solver.html">GCL Solver</a>
      <a href="index.html">Home</a>
    </div>
  </div>

  <script>
    /* ── TC Colors — refined for white bg ── */
    const TC_COLORS = [
      '#8e8e93', // TC0 (guard)
      '#ff3b30', // TC1
      '#34c759', // TC2
      '#ff9500', // TC3
      '#af52de', // TC4
      '#5856d6', // TC5
      '#32ade6', // TC6
      '#007aff', // TC7
    ];
    const TC_NAMES = ['TC0','TC1','TC2','TC3','TC4','TC5','TC6','TC7'];
    const BE_COLOR = '#e5e5ea';

    /* ── Board status ── */
    let boardConnected = false;
    let hasData = false;
    let reading = false;

    async function checkStatus() {
      const chip = document.getElementById('statusChip');
      const text = document.getElementById('statusText');
      const btn = document.getElementById('btnRead');
      try {
        const res = await fetch('/api/board/status');
        const data = await res.json();
        boardConnected = data.connected;
        chip.className = 'chip ' + (data.connected ? 'chip-ok' : 'chip-err');
        text.textContent = data.connected ? `Connected  ${data.device}` : 'Disconnected';
        btn.disabled = !data.connected || reading;
      } catch {
        chip.className = 'chip chip-err';
        text.textContent = 'Server offline';
        btn.disabled = true;
        boardConnected = false;
      }
      if (!boardConnected && !hasData && !reading) {
        document.getElementById('portsContainer').innerHTML = `
          <div class="empty-state">
            <h2>Board Not Connected</h2>
            <p>Connect the LAN9662 to <strong>/dev/ttyACM0</strong> to read configuration.</p>
          </div>`;
      }
    }

    checkStatus().then(() => { if (boardConnected) readBoard(); });
    setInterval(checkStatus, 5000);

    /* ── Read board ── */
    async function readBoard() {
      if (reading || !boardConnected) return;
      reading = true;
      const btn = document.getElementById('btnRead');
      const container = document.getElementById('portsContainer');
      const startTime = Date.now();

      btn.disabled = true;
      btn.textContent = 'Reading...';
      container.innerHTML = `
        <div class="loading-msg">
          <div class="spinner-ring"></div><br>
          Reading TAS configuration from board...<br>
          <span style="font-size:0.8rem;color:var(--text3)">This takes about 30 seconds</span>
        </div>`;

      try {
        const res = await fetch('/api/gcl/read');
        const data = await res.json();
        if (data.error) {
          container.innerHTML = `<div class="error-card">${data.error}</div>`;
          return;
        }
        const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
        document.getElementById('readTime').textContent = `${new Date().toLocaleTimeString()} \u00b7 ${elapsed}s`;
        hasData = true;
        renderPorts(data.ports);
      } catch (e) {
        container.innerHTML = `<div class="error-card">Failed to read: ${e.message}</div>`;
      } finally {
        reading = false;
        btn.disabled = !boardConnected;
        btn.textContent = 'Read from Board';
      }
    }

    /* ── Render ports ── */
    function renderPorts(ports) {
      const container = document.getElementById('portsContainer');
      const keys = Object.keys(ports).sort((a,b) => +a - +b);
      if (!keys.length) {
        container.innerHTML = `<div class="empty-state"><h2>No TAS configuration found</h2></div>`;
        return;
      }
      container.innerHTML = '';
      for (const k of keys) container.appendChild(renderPortCard(k, ports[k]));
    }

    /* ── Single port card ── */
    function renderPortCard(portNum, p) {
      const el = document.createElement('div');
      el.className = 'port-card';

      const cycleNs = p.adminCycleTime?.numerator || 500000;
      const cycleUs = (cycleNs / 1000).toFixed(0);
      const entries = (p.operEntries?.length > 0) ? p.operEntries : p.adminEntries;
      const totalNs = entries.reduce((s, e) => s + e.timeInterval, 0);
      const beEntry = entries.find(e => e.gateStates === 255);
      const utilPct = beEntry ? (100 - (beEntry.timeInterval / cycleNs) * 100).toFixed(1) : '100';

      // Tags
      let tags = '';
      tags += p.gateEnabled
        ? '<span class="tag tag-ok">Enabled</span>'
        : '<span class="tag tag-off">Disabled</span>';
      tags += p.configPending
        ? ' <span class="tag tag-warn">Pending</span>'
        : ' <span class="tag tag-ok">Active</span>';

      el.innerHTML = `
        <div class="port-top">
          <div class="port-icon">${portNum}</div>
          <div class="port-info">
            <h2>Port ${portNum}</h2>
            <div class="port-meta-row">
              <span class="port-meta-item">MAC <strong>${p.macAddress || '\u2014'}</strong></span>
              <span class="port-meta-item">Link <strong>${p.operStatus || 'unknown'}</strong></span>
              <span class="port-meta-item">Tick <strong>${p.tickGranularity || 60} ns</strong></span>
            </div>
          </div>
          <div class="port-tags">${tags}</div>
        </div>

        <div class="metrics-strip">
          <div class="metric">
            <div class="metric-val">${cycleUs}</div>
            <div class="metric-label">Cycle (\u00b5s)</div>
          </div>
          <div class="metric">
            <div class="metric-val">${entries.length}</div>
            <div class="metric-label">GCL Entries</div>
          </div>
          <div class="metric">
            <div class="metric-val">${utilPct}%</div>
            <div class="metric-label">TAS Utilization</div>
          </div>
          <div class="metric">
            <div class="metric-val">${p.supportedListMax || 8}</div>
            <div class="metric-label">Max Entries</div>
          </div>
        </div>

        <div class="section-title">Gate Control List</div>
        <table class="gcl-table">
          <thead>
            <tr>
              <th>#</th>
              <th>Gate Mask</th>
              <th>Traffic Class</th>
              <th style="text-align:right">Duration</th>
              <th style="text-align:right">Cycle %</th>
            </tr>
          </thead>
          <tbody id="tbody-${portNum}"></tbody>
        </table>

        <div class="gantt-section">
          <div class="section-title">Gate Timeline</div>
          <div id="gantt-${portNum}"></div>
          <div class="tc-legend" id="legend-${portNum}"></div>
        </div>
      `;

      // Table rows
      const tbody = el.querySelector(`#tbody-${portNum}`);
      for (const e of entries) {
        const dur = e.timeInterval;
        const durUs = (dur / 1000).toFixed(dur < 10000 ? 3 : 1);
        const pct = ((dur / cycleNs) * 100).toFixed(1);
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td style="color:var(--text3);font-weight:600">${e.index}</td>
          <td>${renderBits(e.gateStates)}</td>
          <td>${tcLabel(e.gateStates)}</td>
          <td style="text-align:right"><strong>${durUs} \u00b5s</strong> <span style="color:var(--text3);font-size:0.72rem">(${dur.toLocaleString()} ns)</span></td>
          <td style="text-align:right;font-weight:600;${parseFloat(pct) > 50 ? 'color:var(--text3)' : ''}">${pct}%</td>
        `;
        tbody.appendChild(tr);
      }

      // Gantt
      el.querySelector(`#gantt-${portNum}`).appendChild(buildGantt(entries, cycleNs));

      // Legend
      const usedTCs = new Set();
      for (const e of entries) {
        for (let b = 0; b < 8; b++) if ((e.gateStates >> b) & 1) usedTCs.add(b);
      }
      const legend = el.querySelector(`#legend-${portNum}`);
      for (const tc of [...usedTCs].sort((a,b) => b-a)) {
        legend.innerHTML += `<span class="tc-legend-item"><span class="tc-legend-dot" style="background:${TC_COLORS[tc]}"></span>${TC_NAMES[tc]}</span>`;
      }

      return el;
    }

    /* ── 8-bit gate visualization ── */
    function renderBits(mask) {
      let h = '<span class="gate-bits">';
      for (let b = 7; b >= 0; b--) {
        const on = (mask >> b) & 1;
        h += `<span class="gate-bit ${on ? 'on' : 'off'}" style="${on ? `background:${TC_COLORS[b]}` : ''}" title="TC${b}">${b}</span>`;
      }
      return h + '</span>';
    }

    /* ── TC label text ── */
    function tcLabel(mask) {
      if (mask === 255) return '<span style="color:var(--text3)">All Open (Best Effort)</span>';
      const tcs = [];
      for (let b = 7; b >= 0; b--) {
        if ((mask >> b) & 1) tcs.push(`<span style="color:${TC_COLORS[b]};font-weight:700">${TC_NAMES[b]}</span>`);
      }
      return tcs.join(' ');
    }

    /* ── SVG Gantt ── */
    function buildGantt(entries, cycleNs) {
      const ns = 'http://www.w3.org/2000/svg';
      const W = 800, barH = 44, padY = 4;
      const H = barH + padY * 2 + 20;

      const svg = document.createElementNS(ns, 'svg');
      svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
      svg.setAttribute('class', 'gantt-svg');

      // Background
      const bgRect = document.createElementNS(ns, 'rect');
      bgRect.setAttribute('x', 0); bgRect.setAttribute('y', 0);
      bgRect.setAttribute('width', W); bgRect.setAttribute('height', H);
      bgRect.setAttribute('rx', 12); bgRect.setAttribute('fill', '#f5f5f7');
      svg.appendChild(bgRect);

      let x = 0;
      for (const e of entries) {
        const w = (e.timeInterval / cycleNs) * W;
        if (w < 0.3) { x += w; continue; }

        const mask = e.gateStates;
        const color = mask === 255 ? BE_COLOR : getColor(mask);

        const rect = document.createElementNS(ns, 'rect');
        rect.setAttribute('x', x + 0.5);
        rect.setAttribute('y', padY);
        rect.setAttribute('width', Math.max(w - 1, 1));
        rect.setAttribute('height', barH);
        rect.setAttribute('rx', w > 8 ? 6 : 2);
        rect.setAttribute('fill', color);
        svg.appendChild(rect);

        // Label
        if (w > 28) {
          const lbl = document.createElementNS(ns, 'text');
          lbl.setAttribute('x', x + w / 2);
          lbl.setAttribute('y', padY + barH / 2 - 3);
          lbl.setAttribute('text-anchor', 'middle');
          lbl.setAttribute('dominant-baseline', 'central');
          lbl.setAttribute('font-family', 'Inter, system-ui');
          lbl.setAttribute('font-size', w > 50 ? '12' : '9');
          lbl.setAttribute('font-weight', '700');
          lbl.setAttribute('fill', mask === 255 ? '#aeaeb2' : '#fff');
          lbl.textContent = gLabel(mask);
          svg.appendChild(lbl);

          const durLbl = document.createElementNS(ns, 'text');
          durLbl.setAttribute('x', x + w / 2);
          durLbl.setAttribute('y', padY + barH / 2 + 10);
          durLbl.setAttribute('text-anchor', 'middle');
          durLbl.setAttribute('font-family', 'Inter, system-ui');
          durLbl.setAttribute('font-size', '9');
          durLbl.setAttribute('font-weight', '500');
          durLbl.setAttribute('fill', mask === 255 ? '#c7c7cc' : 'rgba(255,255,255,.7)');
          durLbl.textContent = `${(e.timeInterval / 1000).toFixed(1)}\u00b5s`;
          svg.appendChild(durLbl);
        }

        x += w;
      }

      // Time markers
      for (let i = 0; i <= 4; i++) {
        const tx = (W * i) / 4;
        const t = ((cycleNs * i) / 4 / 1000).toFixed(0);
        const mark = document.createElementNS(ns, 'text');
        mark.setAttribute('x', i === 4 ? tx - 2 : (i === 0 ? tx + 2 : tx));
        mark.setAttribute('y', H - 3);
        mark.setAttribute('text-anchor', i === 4 ? 'end' : (i === 0 ? 'start' : 'middle'));
        mark.setAttribute('font-family', 'Inter, system-ui');
        mark.setAttribute('font-size', '9');
        mark.setAttribute('font-weight', '500');
        mark.setAttribute('fill', '#aeaeb2');
        mark.textContent = `${t}\u00b5s`;
        svg.appendChild(mark);
      }

      return svg;
    }

    function getColor(mask) {
      for (let b = 7; b >= 0; b--) if ((mask >> b) & 1) return TC_COLORS[b];
      return '#8e8e93';
    }
    function gLabel(mask) {
      if (mask === 255) return 'ALL OPEN';
      const t = [];
      for (let b = 7; b >= 0; b--) if ((mask >> b) & 1) t.push(TC_NAMES[b]);
      return t.join('+');
    }
  </script>
</body>
