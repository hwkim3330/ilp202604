<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LAN9662 Board Configuration</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #fafafa;
      --card: #ffffff;
      --border: rgba(0,0,0,.06);
      --border-hi: rgba(0,0,0,.12);
      --text: #1d1d1f;
      --text2: #6e6e73;
      --text3: #aeaeb2;
      --accent: #007aff;
      --green: #34c759;
      --orange: #ff9500;
      --red: #ff3b30;
      --radius: 20px;
      --shadow: 0 2px 12px rgba(0,0,0,.04), 0 0.5px 1px rgba(0,0,0,.06);
      --shadow-lg: 0 8px 40px rgba(0,0,0,.06), 0 1px 3px rgba(0,0,0,.04);
    }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    .wrap { max-width: 960px; margin: 0 auto; padding: 48px 24px 80px; }

    /* Header */
    .header { text-align: center; margin-bottom: 48px; }
    .header .logo { height: 28px; margin-bottom: 20px; opacity: .6; }
    .header h1 { font-size: 2.8rem; font-weight: 800; letter-spacing: -0.035em; line-height: 1.1; }
    .header .sub { font-size: 1.05rem; color: var(--text2); margin-top: 10px; }
    .chip {
      display: inline-flex; align-items: center; gap: 6px;
      margin-top: 16px; padding: 6px 16px; border-radius: 100px;
      font-size: 0.78rem; font-weight: 600;
    }
    .chip-ok { background: rgba(52,199,89,.1); color: #248a3d; }
    .chip-err { background: rgba(255,59,48,.08); color: var(--red); }
    .chip .dot { width: 7px; height: 7px; border-radius: 50%; }
    .chip-ok .dot { background: var(--green); }
    .chip-err .dot { background: var(--red); }

    /* Action bar */
    .action-bar {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 24px; flex-wrap: wrap; gap: 12px;
    }
    .read-time { font-size: 0.82rem; color: var(--text3); font-weight: 500; }
    .btn {
      border: none; border-radius: 100px; padding: 12px 28px;
      font-weight: 600; font-size: 0.88rem; cursor: pointer; transition: all .2s;
      letter-spacing: -0.01em;
    }
    .btn-primary { background: var(--text); color: #fff; }
    .btn-primary:hover { background: #333; transform: scale(1.02); }
    .btn-primary:disabled { opacity: .3; cursor: not-allowed; transform: none; }
    .btn-sm {
      padding: 8px 18px; font-size: 0.8rem; border-radius: 10px;
      font-weight: 600; cursor: pointer; transition: all .15s; border: none;
    }
    .btn-edit { background: rgba(0,122,255,.08); color: var(--accent); }
    .btn-edit:hover { background: rgba(0,122,255,.15); }
    .btn-push { background: var(--accent); color: #fff; }
    .btn-push:hover { background: #0068d6; }
    .btn-push:disabled { opacity: .4; cursor: not-allowed; }
    .btn-cancel { background: rgba(0,0,0,.05); color: var(--text2); }
    .btn-cancel:hover { background: rgba(0,0,0,.1); }
    .btn-danger { background: rgba(255,59,48,.08); color: var(--red); }
    .btn-danger:hover { background: rgba(255,59,48,.15); }
    .btn-ghost {
      background: none; border: 1.5px dashed var(--border-hi); color: var(--text3);
      border-radius: 10px; padding: 10px; font-size: 0.8rem; font-weight: 600;
      cursor: pointer; transition: all .15s; width: 100%;
    }
    .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

    /* Loading */
    .loading-msg { text-align: center; padding: 100px 20px; color: var(--text2); font-size: 0.95rem; font-weight: 500; }
    .spinner-ring {
      display: inline-block; width: 36px; height: 36px;
      border: 3px solid var(--border); border-top-color: var(--text);
      border-radius: 50%; animation: spin .8s linear infinite; margin-bottom: 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Port card */
    .port-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 32px;
      margin-bottom: 20px; box-shadow: var(--shadow); transition: all .3s;
    }
    .port-card:hover { box-shadow: var(--shadow-lg); }
    .port-card.editing { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,122,255,.1), var(--shadow-lg); }

    .port-top { display: flex; align-items: flex-start; gap: 20px; margin-bottom: 28px; }
    .port-icon {
      width: 56px; height: 56px; border-radius: 16px;
      background: linear-gradient(135deg, #f5f5f7, #e8e8ed);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem; font-weight: 800; color: var(--text); flex-shrink: 0;
    }
    .port-info { flex: 1; }
    .port-info h2 { font-size: 1.25rem; font-weight: 700; letter-spacing: -0.02em; }
    .port-meta-row { display: flex; gap: 20px; margin-top: 6px; flex-wrap: wrap; }
    .port-meta-item { font-size: 0.8rem; color: var(--text3); font-weight: 500; }
    .port-meta-item strong { color: var(--text2); font-weight: 600; }
    .port-actions { display: flex; gap: 8px; flex-shrink: 0; align-items: flex-start; }
    .tag { padding: 5px 12px; border-radius: 8px; font-size: 0.72rem; font-weight: 600; }
    .tag-ok { background: rgba(52,199,89,.08); color: #248a3d; }
    .tag-warn { background: rgba(255,149,0,.1); color: #c77c00; }
    .tag-off { background: rgba(255,59,48,.08); color: var(--red); }

    /* Metrics */
    .metrics-strip {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 1px; background: var(--border); border-radius: 14px;
      overflow: hidden; margin-bottom: 24px;
    }
    .metric { background: var(--card); padding: 18px 20px; text-align: center; }
    .metric-val { font-size: 1.5rem; font-weight: 800; letter-spacing: -0.03em; }
    .metric-label { font-size: 0.68rem; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; margin-top: 2px; }

    /* GCL table */
    .section-title { font-size: 0.72rem; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 12px; }
    .gcl-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
    .gcl-table th {
      text-align: left; padding: 10px 12px; font-weight: 600; font-size: 0.7rem;
      color: var(--text3); text-transform: uppercase; letter-spacing: 0.05em;
      border-bottom: 2px solid var(--border);
    }
    .gcl-table td { padding: 12px 12px; border-bottom: 1px solid var(--border); font-variant-numeric: tabular-nums; }
    .gcl-table tr:last-child td { border-bottom: none; }
    .gcl-table tr:hover td { background: rgba(0,0,0,.015); }

    /* Gate bits */
    .gate-bits { display: inline-flex; gap: 3px; }
    .gate-bit {
      width: 18px; height: 18px; border-radius: 4px;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 8px; font-weight: 700; transition: all .15s;
    }
    .gate-bit.on { color: #fff; box-shadow: 0 1px 3px rgba(0,0,0,.15); }
    .gate-bit.off { background: #f0f0f2; color: #c7c7cc; }
    .gate-bit.clickable { cursor: pointer; }
    .gate-bit.clickable:hover { transform: scale(1.25); }

    /* Gantt */
    .gantt-section { margin-top: 24px; padding-top: 24px; border-top: 1px solid var(--border); }
    .gantt-svg { width: 100%; overflow: visible; border-radius: 12px; }
    .tc-legend { display: flex; gap: 16px; flex-wrap: wrap; margin-top: 12px; }
    .tc-legend-item { display: flex; align-items: center; gap: 6px; font-size: 0.72rem; font-weight: 600; color: var(--text2); }
    .tc-legend-dot { width: 10px; height: 10px; border-radius: 3px; }

    /* Edit mode inputs */
    .edit-input {
      border: 1.5px solid var(--border-hi); border-radius: 8px;
      padding: 6px 10px; font-size: 0.82rem; font-weight: 600;
      font-family: inherit; width: 100px; text-align: right;
      outline: none; transition: border-color .15s;
      background: #fafafa;
    }
    .edit-input:focus { border-color: var(--accent); background: #fff; }
    .edit-input.sm { width: 72px; }
    .edit-cycle-wrap {
      display: flex; align-items: center; gap: 12px; margin-bottom: 20px;
      padding: 16px 20px; background: #f5f5f7; border-radius: 14px;
    }
    .edit-cycle-wrap label { font-size: 0.82rem; font-weight: 600; color: var(--text2); }
    .edit-footer {
      display: flex; gap: 10px; margin-top: 20px; align-items: center;
    }
    .edit-footer .spacer { flex: 1; }
    .edit-warn { font-size: 0.78rem; color: var(--orange); font-weight: 600; }
    .edit-ok { font-size: 0.78rem; color: var(--green); font-weight: 600; }
    .edit-row-del {
      background: none; border: none; cursor: pointer; color: var(--text3);
      font-size: 1rem; padding: 4px 8px; border-radius: 6px; transition: all .15s;
    }
    .edit-row-del:hover { color: var(--red); background: rgba(255,59,48,.08); }

    /* Presets */
    .preset-bar {
      display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; align-items: center;
    }
    .preset-label { font-size: 0.72rem; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; }
    .preset-chip {
      padding: 6px 14px; border-radius: 100px; font-size: 0.75rem; font-weight: 600;
      border: 1.5px solid var(--border-hi); background: #fff; color: var(--text2);
      cursor: pointer; transition: all .15s;
    }
    .preset-chip:hover { border-color: var(--accent); color: var(--accent); }

    /* Push result toast */
    .toast {
      position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
      padding: 14px 28px; border-radius: 14px; font-size: 0.88rem; font-weight: 600;
      box-shadow: 0 8px 30px rgba(0,0,0,.15); z-index: 100;
      animation: toastIn .3s ease;
    }
    .toast-ok { background: #1d1d1f; color: #fff; }
    .toast-err { background: var(--red); color: #fff; }
    @keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(20px); } }

    /* Nav */
    .nav-bar { display: flex; gap: 12px; margin-top: 40px; justify-content: center; }
    .nav-bar a {
      color: var(--text2); text-decoration: none; font-size: 0.85rem; font-weight: 600;
      padding: 10px 20px; border-radius: 100px; border: 1px solid var(--border); transition: all .2s;
    }
    .nav-bar a:hover { border-color: var(--text); color: var(--text); }

    .error-card { background: rgba(255,59,48,.04); border: 1px solid rgba(255,59,48,.12); border-radius: var(--radius); padding: 24px 32px; color: var(--red); font-weight: 500; }

    /* Quick Profiles */
    .profiles-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 24px 28px;
      margin-bottom: 24px; box-shadow: var(--shadow);
    }
    .profiles-title {
      font-size: 0.72rem; font-weight: 700; color: var(--text3);
      text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 14px;
    }
    .profiles-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 10px;
    }
    .profile-btn {
      display: flex; align-items: center; gap: 14px;
      padding: 16px 18px; border-radius: 14px;
      border: 1.5px solid var(--border); background: #fff;
      cursor: pointer; transition: all .2s; text-align: left;
    }
    .profile-btn:hover { border-color: var(--accent); box-shadow: 0 2px 12px rgba(0,122,255,.08); }
    .profile-btn:active { transform: scale(0.98); }
    .profile-btn.active { border-color: var(--accent); background: rgba(0,122,255,.03); }
    .profile-btn:disabled { opacity: .4; cursor: not-allowed; transform: none; }
    .profile-icon {
      width: 40px; height: 40px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem; flex-shrink: 0;
    }
    .profile-text h3 { font-size: 0.88rem; font-weight: 700; color: var(--text); }
    .profile-text p { font-size: 0.72rem; color: var(--text3); margin-top: 2px; line-height: 1.4; }
    .profile-applying {
      font-size: 0.78rem; font-weight: 600; color: var(--accent);
      display: flex; align-items: center; gap: 6px; margin-top: 12px;
    }
    .spinner-sm {
      display: inline-block; width: 14px; height: 14px;
      border: 2px solid var(--border); border-top-color: var(--accent);
      border-radius: 50%; animation: spin .7s linear infinite;
    }

    @media (max-width: 600px) {
      .header h1 { font-size: 2rem; }
      .port-card { padding: 20px; }
      .port-top { flex-direction: column; gap: 12px; }
      .metrics-strip { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="header">
      <img src="keti.png" alt="KETI" class="logo" onerror="this.style.display='none'">
      <h1>LAN9662</h1>
      <p class="sub">IEEE 802.1Qbv Time-Aware Shaper Configuration</p>
      <div style="display:flex;align-items:center;gap:8px;margin-top:12px;justify-content:center;flex-wrap:wrap;">
        <select id="boardSelect" style="padding:6px 12px;border-radius:10px;border:1px solid var(--border);font-size:0.82rem;font-family:inherit;background:var(--card);cursor:pointer;">
          <option value="">Loading boards...</option>
        </select>
        <div id="statusChip" class="chip chip-err">
          <span class="dot"></span>
          <span id="statusText">Connecting...</span>
        </div>
      </div>
    </header>

    <div class="action-bar">
      <span class="read-time" id="readTime"></span>
      <button class="btn btn-primary" id="btnRead" disabled onclick="readBoard()">Read from Board</button>
    </div>

    <!-- Quick Profiles -->
    <div class="profiles-card" id="profilesCard">
      <div class="profiles-title">Quick Profiles</div>
      <div class="profiles-grid" id="profilesGrid"></div>
      <div id="profileStatus"></div>
    </div>

    <div id="portsContainer">
      <div class="loading-msg"><div class="spinner-ring"></div><br>Connecting to board...</div>
    </div>

    <div class="nav-bar">
      <a href="dashboard.html">Dashboard</a>
      <a href="solver.html">GCL Solver</a>
      <a href="lidar.html">LiDAR</a>
      <a href="index.html">Home</a>
    </div>
  </div>

  <script>
    /* ══════════════════════════════════════════
       Constants
       ══════════════════════════════════════════ */
    const TC = [
      { name: 'TC0', color: '#8e8e93' },
      { name: 'TC1', color: '#ff3b30' },
      { name: 'TC2', color: '#34c759' },
      { name: 'TC3', color: '#ff9500' },
      { name: 'TC4', color: '#af52de' },
      { name: 'TC5', color: '#5856d6' },
      { name: 'TC6', color: '#32ade6' },
      { name: 'TC7', color: '#007aff' },
    ];
    const BE_COLOR = '#e5e5ea';

    /* Per-port presets (used in editor) */
    const PRESETS = {
      'LiDAR + BE': {
        cycleUs: 500,
        entries: [
          { gateStates: 128, durationUs: 262.4 },
          { gateStates: 255, durationUs: 237.6 },
        ]
      },
      'Multi-sensor': {
        cycleUs: 500,
        entries: [
          { gateStates: 128, durationUs: 10.288 },
          { gateStates: 1,   durationUs: 1.0 },
          { gateStates: 64,  durationUs: 6.8 },
          { gateStates: 32,  durationUs: 6.8 },
          { gateStates: 8,   durationUs: 1.328 },
          { gateStates: 255, durationUs: 473.784 },
        ]
      },
      'All Open': {
        cycleUs: 500,
        entries: [{ gateStates: 255, durationUs: 500 }]
      },
      'TAS Off': {
        cycleUs: 500,
        entries: [{ gateStates: 255, durationUs: 500 }],
        gateDisabled: true
      },
    };

    /* Quick Profiles — both ports at once */
    const PROFILES = [
      {
        id: 'multi-sensor',
        name: 'Multi-sensor',
        desc: 'Port 1: Radar+LiDAR+Camera (6 TC), Port 2: LiDAR priority',
        icon: '\ud83d\udce1',
        iconBg: 'linear-gradient(135deg, #e8f0fe, #d2e3fc)',
        ports: {
          '1': { cycleUs: 500, entries: [
            { gateStates: 128, durationUs: 10.288 },
            { gateStates: 1,   durationUs: 1.0 },
            { gateStates: 64,  durationUs: 6.8 },
            { gateStates: 32,  durationUs: 6.8 },
            { gateStates: 8,   durationUs: 1.328 },
            { gateStates: 255, durationUs: 473.784 },
          ]},
          '2': { cycleUs: 500, entries: [
            { gateStates: 128, durationUs: 262.4 },
            { gateStates: 255, durationUs: 237.6 },
          ]},
        }
      },
      {
        id: 'lidar-only',
        name: 'LiDAR Only',
        desc: 'Both ports: TC7 LiDAR priority (52%) + Best Effort',
        icon: '\ud83d\udd35',
        iconBg: 'linear-gradient(135deg, #e3f2fd, #bbdefb)',
        ports: {
          '1': { cycleUs: 500, entries: [
            { gateStates: 128, durationUs: 262.4 },
            { gateStates: 255, durationUs: 237.6 },
          ]},
          '2': { cycleUs: 500, entries: [
            { gateStates: 128, durationUs: 262.4 },
            { gateStates: 255, durationUs: 237.6 },
          ]},
        }
      },
      {
        id: 'all-open',
        name: 'All Open',
        desc: 'No TAS shaping \u2014 all traffic classes pass freely',
        icon: '\ud83d\udd13',
        iconBg: 'linear-gradient(135deg, #e8f5e9, #c8e6c9)',
        ports: {
          '1': { cycleUs: 500, entries: [{ gateStates: 255, durationUs: 500 }] },
          '2': { cycleUs: 500, entries: [{ gateStates: 255, durationUs: 500 }] },
        }
      },
      {
        id: 'custom',
        name: 'Custom',
        desc: 'Use the editor on each port card to build your own config',
        icon: '\u2699\ufe0f',
        iconBg: 'linear-gradient(135deg, #f3e5f5, #e1bee7)',
        action: 'edit'
      },
    ];

    /* ══════════════════════════════════════════
       State
       ══════════════════════════════════════════ */
    let boardConnected = false;
    let hasData = false;
    let reading = false;
    let lastPortsData = {};   // last read data for re-render
    const editState = {};      // portNum → { cycleUs, entries: [{gateStates, durationUs}] }

    /* ── Board selection (config-driven, Ethernet default) ── */
    const boardSelect = document.getElementById('boardSelect');
    let serverBoards = [];
    let selectedBoardId = null;

    async function loadBoards() {
      try {
        const res = await fetch('/api/config');
        const cfg = await res.json();
        serverBoards = cfg.boards || [];
        boardSelect.innerHTML = '';
        for (const b of serverBoards) {
          const opt = document.createElement('option');
          opt.value = b.id;
          opt.textContent = `${b.id} (${b.host})`;
          boardSelect.appendChild(opt);
        }
        if (serverBoards.length > 0) {
          selectedBoardId = serverBoards[0].id;
          boardSelect.value = selectedBoardId;
        }
      } catch { boardSelect.innerHTML = '<option>Server offline</option>'; }
    }
    boardSelect.addEventListener('change', () => {
      selectedBoardId = boardSelect.value;
      hasData = false;
      lastPortsData = {};
      checkStatus();
    });

    function getSelectedBoard() { return serverBoards.find(b => b.id === selectedBoardId); }
    function getBoardTransport() { return 'eth'; }
    function getBoardHost() { return getSelectedBoard()?.host || '192.168.1.10'; }

    /* ══════════════════════════════════════════
       Board Status
       ══════════════════════════════════════════ */
    async function checkStatus() {
      const chip = document.getElementById('statusChip');
      const text = document.getElementById('statusText');
      const btn = document.getElementById('btnRead');
      if (!selectedBoardId) { text.textContent = 'No board'; btn.disabled = true; return; }
      try {
        const res = await fetch(`/api/board/${selectedBoardId}/status`);
        const d = await res.json();
        boardConnected = d.connected;
        chip.className = 'chip ' + (d.connected ? 'chip-ok' : 'chip-err');
        text.textContent = d.connected ? `Connected ${d.host}` : `Offline ${d.host}`;
        btn.disabled = !d.connected || reading;
      } catch {
        chip.className = 'chip chip-err';
        text.textContent = 'Server offline';
        btn.disabled = true;
        boardConnected = false;
      }
      if (!boardConnected && !hasData && !reading) {
        document.getElementById('portsContainer').innerHTML = `
          <div class="loading-msg" style="color:var(--text3)">
            Board not connected. Check Ethernet connection to ${getBoardHost()}.
          </div>`;
      }
      renderProfiles();
    }
    loadBoards().then(() => checkStatus().then(() => { if (boardConnected) readBoard(); }));
    setInterval(checkStatus, 8000);

    /* ══════════════════════════════════════════
       Quick Profiles
       ══════════════════════════════════════════ */
    let activeProfile = null;
    let applyingProfile = false;

    function renderProfiles() {
      const grid = document.getElementById('profilesGrid');
      grid.innerHTML = '';
      for (const p of PROFILES) {
        const btn = document.createElement('button');
        btn.className = 'profile-btn' + (activeProfile === p.id ? ' active' : '');
        btn.disabled = !boardConnected || applyingProfile;
        btn.onclick = () => p.action === 'edit' ? scrollToEdit() : applyProfile(p);
        btn.innerHTML = `
          <div class="profile-icon" style="background:${p.iconBg}">${p.icon}</div>
          <div class="profile-text">
            <h3>${p.name}</h3>
            <p>${p.desc}</p>
          </div>`;
        grid.appendChild(btn);
      }
    }
    renderProfiles();

    function scrollToEdit() {
      const first = document.querySelector('.port-card');
      if (first) {
        const portNum = first.id.replace('port-card-', '');
        if (portNum && lastPortsData[portNum]) startEdit(portNum);
      }
    }

    async function applyProfile(profile) {
      if (applyingProfile || !boardConnected) return;
      applyingProfile = true;
      activeProfile = profile.id;
      renderProfiles();

      const status = document.getElementById('profileStatus');
      status.innerHTML = `<div class="profile-applying"><span class="spinner-sm"></span> Applying ${profile.name}...</div>`;

      const portNums = Object.keys(profile.ports);
      let allOk = true;

      for (const pn of portNums) {
        const cfg = profile.ports[pn];
        try {
          const res = await fetch('/api/gcl/push-port', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ port: pn, cycleUs: cfg.cycleUs, entries: cfg.entries, transport: 'eth', host: getBoardHost() })
          });
          const data = await res.json();
          if (!data.success) { allOk = false; showToast(`Port ${pn} failed: ${data.error || 'unknown'}`, 'err'); }
        } catch (e) {
          allOk = false;
          showToast(`Port ${pn} error: ${e.message}`, 'err');
        }
      }

      applyingProfile = false;
      status.innerHTML = '';

      if (allOk) {
        showToast(`${profile.name} applied to all ports`, 'ok');
        readBoard();
      }
      renderProfiles();
    }

    /* ══════════════════════════════════════════
       Read Board
       ══════════════════════════════════════════ */
    async function readBoard() {
      if (reading || !boardConnected || !selectedBoardId) return;
      reading = true;
      const btn = document.getElementById('btnRead');
      const ct = document.getElementById('portsContainer');
      const start = Date.now();
      btn.disabled = true; btn.textContent = 'Reading...';
      ct.innerHTML = `<div class="loading-msg"><div class="spinner-ring"></div><br>Reading TAS from ${selectedBoardId}...<br><span style="font-size:.8rem;color:var(--text3)">Ethernet → Serial fallback</span></div>`;
      try {
        const res = await fetch(`/api/board/${selectedBoardId}/gcl`);
        const data = await res.json();
        if (data.error) { ct.innerHTML = `<div class="error-card">${data.error}</div>`; return; }
        const sec = ((Date.now() - start) / 1000).toFixed(1);
        document.getElementById('readTime').textContent = `${selectedBoardId} \u00b7 ${new Date().toLocaleTimeString()} \u00b7 ${sec}s`;
        hasData = true;
        lastPortsData = data.ports;
        renderPorts(data.ports);
      } catch (e) {
        ct.innerHTML = `<div class="error-card">Failed: ${e.message}</div>`;
      } finally {
        reading = false;
        btn.disabled = !boardConnected;
        btn.textContent = 'Read from Board';
      }
    }

    /* ══════════════════════════════════════════
       Render — View Mode
       ══════════════════════════════════════════ */
    function renderPorts(ports) {
      const ct = document.getElementById('portsContainer');
      const keys = Object.keys(ports).sort((a,b) => +a - +b);
      if (!keys.length) { ct.innerHTML = `<div class="loading-msg" style="color:var(--text3)">No TAS-configured ports found.</div>`; return; }
      ct.innerHTML = '';
      for (const k of keys) ct.appendChild(renderPortCard(k, ports[k]));
    }

    function renderPortCard(portNum, p) {
      // If in edit mode for this port, render editor instead
      if (editState[portNum]) return renderEditor(portNum);

      const el = document.createElement('div');
      el.className = 'port-card';
      el.id = `port-card-${portNum}`;

      const cycleNs = p.adminCycleTime?.numerator || 500000;
      const cycleUs = cycleNs / 1000;
      const entries = (p.operEntries?.length > 0) ? p.operEntries : p.adminEntries;
      const beEntry = entries.find(e => e.gateStates === 255);
      const utilPct = beEntry ? (100 - (beEntry.timeInterval / cycleNs) * 100).toFixed(1) : '100';

      let tags = p.gateEnabled ? '<span class="tag tag-ok">Enabled</span>' : '<span class="tag tag-off">Disabled</span>';
      tags += p.configPending ? ' <span class="tag tag-warn">Pending</span>' : ' <span class="tag tag-ok">Active</span>';

      el.innerHTML = `
        <div class="port-top">
          <div class="port-icon">${portNum}</div>
          <div class="port-info">
            <h2>Port ${portNum}</h2>
            <div class="port-meta-row">
              <span class="port-meta-item">MAC <strong>${p.macAddress || '\u2014'}</strong></span>
              <span class="port-meta-item">Link <strong>${p.operStatus || 'unknown'}</strong></span>
            </div>
          </div>
          <div class="port-actions">
            ${tags}
            <button class="btn-sm btn-edit" onclick="startEdit('${portNum}')">Edit</button>
          </div>
        </div>
        <div class="metrics-strip">
          <div class="metric"><div class="metric-val">${cycleUs.toFixed(0)}</div><div class="metric-label">Cycle (\u00b5s)</div></div>
          <div class="metric"><div class="metric-val">${entries.length}</div><div class="metric-label">Entries</div></div>
          <div class="metric"><div class="metric-val">${utilPct}%</div><div class="metric-label">TAS Util</div></div>
          <div class="metric"><div class="metric-val">${p.supportedListMax || 8}</div><div class="metric-label">Max</div></div>
        </div>
        <div class="section-title">Gate Control List</div>
        <table class="gcl-table"><thead><tr>
          <th>#</th><th>Gate Mask</th><th>Traffic Class</th>
          <th style="text-align:right">Duration</th><th style="text-align:right">%</th>
        </tr></thead><tbody id="tbody-${portNum}"></tbody></table>
        <div class="gantt-section">
          <div class="section-title">Gate Timeline</div>
          <div id="gantt-${portNum}"></div>
          <div class="tc-legend" id="legend-${portNum}"></div>
        </div>`;

      const tbody = el.querySelector(`#tbody-${portNum}`);
      for (const e of entries) {
        const dur = e.timeInterval;
        const durUs = (dur / 1000).toFixed(dur < 10000 ? 3 : 1);
        const pct = ((dur / cycleNs) * 100).toFixed(1);
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td style="color:var(--text3);font-weight:600">${e.index}</td>
          <td>${renderBits(e.gateStates, false)}</td>
          <td>${tcLabel(e.gateStates)}</td>
          <td style="text-align:right"><strong>${durUs} \u00b5s</strong> <span style="color:var(--text3);font-size:.72rem">(${dur.toLocaleString()} ns)</span></td>
          <td style="text-align:right;font-weight:600;${parseFloat(pct)>50?'color:var(--text3)':''}">${pct}%</td>`;
        tbody.appendChild(tr);
      }
      el.querySelector(`#gantt-${portNum}`).appendChild(buildGantt(entries.map(e => ({gateStates:e.gateStates, durationUs:e.timeInterval/1000})), cycleUs));
      const usedTCs = new Set();
      for (const e of entries) for (let b = 0; b < 8; b++) if ((e.gateStates >> b) & 1) usedTCs.add(b);
      const leg = el.querySelector(`#legend-${portNum}`);
      for (const tc of [...usedTCs].sort((a,b) => b-a))
        leg.innerHTML += `<span class="tc-legend-item"><span class="tc-legend-dot" style="background:${TC[tc].color}"></span>${TC[tc].name}</span>`;

      return el;
    }

    /* ══════════════════════════════════════════
       Render — Edit Mode
       ══════════════════════════════════════════ */
    function startEdit(portNum) {
      const p = lastPortsData[portNum];
      if (!p) return;
      const cycleNs = p.adminCycleTime?.numerator || 500000;
      const entries = (p.operEntries?.length > 0) ? p.operEntries : p.adminEntries;
      editState[portNum] = {
        cycleUs: cycleNs / 1000,
        entries: entries.map(e => ({ gateStates: e.gateStates, durationUs: e.timeInterval / 1000 }))
      };
      rerenderPort(portNum);
    }

    function cancelEdit(portNum) {
      delete editState[portNum];
      rerenderPort(portNum);
    }

    function applyPreset(portNum, presetName) {
      const p = PRESETS[presetName];
      if (!p) return;
      editState[portNum] = {
        cycleUs: p.cycleUs,
        entries: p.entries.map(e => ({ ...e }))
      };
      rerenderPort(portNum);
    }

    function rerenderPort(portNum) {
      const old = document.getElementById(`port-card-${portNum}`);
      if (!old) return;
      const p = lastPortsData[portNum];
      const newCard = editState[portNum] ? renderEditor(portNum) : renderPortCard(portNum, p);
      old.replaceWith(newCard);
    }

    function renderEditor(portNum) {
      const st = editState[portNum];
      const el = document.createElement('div');
      el.className = 'port-card editing';
      el.id = `port-card-${portNum}`;

      const totalUs = st.entries.reduce((s, e) => s + e.durationUs, 0);
      const diff = st.cycleUs - totalUs;
      const diffAbs = Math.abs(diff);
      const isOk = diffAbs < 0.01;

      el.innerHTML = `
        <div class="port-top">
          <div class="port-icon" style="background:linear-gradient(135deg,#e8f0fe,#d2e3fc)">${portNum}</div>
          <div class="port-info">
            <h2>Port ${portNum} <span style="color:var(--accent);font-size:.85rem;font-weight:600">Editing</span></h2>
          </div>
          <div class="port-actions">
            <button class="btn-sm btn-cancel" onclick="cancelEdit('${portNum}')">Cancel</button>
          </div>
        </div>

        <!-- Presets -->
        <div class="preset-bar">
          <span class="preset-label">Presets</span>
          ${Object.keys(PRESETS).map(k => `<button class="preset-chip" onclick="applyPreset('${portNum}','${k}')">${k}</button>`).join('')}
        </div>

        <!-- Cycle time -->
        <div class="edit-cycle-wrap">
          <label>Cycle Time</label>
          <input type="number" class="edit-input" value="${st.cycleUs}" min="1" step="any"
                 onchange="editCycle('${portNum}', this.value)">
          <span style="font-size:.82rem;color:var(--text3)">\u00b5s</span>
          <span style="flex:1"></span>
          <span class="${isOk ? 'edit-ok' : 'edit-warn'}">
            ${isOk ? 'Total matches cycle' : (diff > 0 ? `${diff.toFixed(3)} \u00b5s remaining` : `${diffAbs.toFixed(3)} \u00b5s over!`)}
          </span>
        </div>

        <!-- Entry table -->
        <table class="gcl-table"><thead><tr>
          <th>#</th><th>Gate Mask</th><th>Traffic Classes</th>
          <th style="text-align:right">Duration (\u00b5s)</th><th></th>
        </tr></thead><tbody id="edit-tbody-${portNum}"></tbody></table>

        <div style="margin-top:12px">
          <button class="btn-ghost" onclick="addEntry('${portNum}')">+ Add Entry</button>
        </div>

        <!-- Gantt preview -->
        <div class="gantt-section">
          <div class="section-title">Preview</div>
          <div id="edit-gantt-${portNum}"></div>
        </div>

        <!-- Footer -->
        <div class="edit-footer">
          <button class="btn-sm btn-cancel" onclick="cancelEdit('${portNum}')">Cancel</button>
          <span class="spacer"></span>
          <button class="btn-sm btn-push" onclick="pushPort('${portNum}')" ${isOk ? '' : 'disabled'}>
            Push to Board
          </button>
        </div>`;

      // Populate entry rows
      const tbody = el.querySelector(`#edit-tbody-${portNum}`);
      st.entries.forEach((e, i) => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td style="color:var(--text3);font-weight:600">${i}</td>
          <td>${renderBits(e.gateStates, true, portNum, i)}</td>
          <td>${tcLabel(e.gateStates)}</td>
          <td style="text-align:right">
            <input type="number" class="edit-input sm" value="${e.durationUs}" min="0" step="any"
                   onchange="editDuration('${portNum}', ${i}, this.value)">
          </td>
          <td><button class="edit-row-del" onclick="removeEntry('${portNum}', ${i})" title="Delete">\u00d7</button></td>`;
        tbody.appendChild(tr);
      });

      // Gantt preview
      el.querySelector(`#edit-gantt-${portNum}`).appendChild(buildGantt(st.entries, st.cycleUs));

      return el;
    }

    /* ══════════════════════════════════════════
       Edit Actions
       ══════════════════════════════════════════ */
    function editCycle(portNum, val) {
      editState[portNum].cycleUs = parseFloat(val) || 500;
      rerenderPort(portNum);
    }
    function editDuration(portNum, idx, val) {
      editState[portNum].entries[idx].durationUs = parseFloat(val) || 0;
      rerenderPort(portNum);
    }
    function toggleBit(portNum, idx, bit) {
      editState[portNum].entries[idx].gateStates ^= (1 << bit);
      rerenderPort(portNum);
    }
    function addEntry(portNum) {
      const st = editState[portNum];
      const totalUsed = st.entries.reduce((s, e) => s + e.durationUs, 0);
      const remaining = Math.max(0, st.cycleUs - totalUsed);
      st.entries.push({ gateStates: 255, durationUs: parseFloat(remaining.toFixed(3)) });
      rerenderPort(portNum);
    }
    function removeEntry(portNum, idx) {
      editState[portNum].entries.splice(idx, 1);
      rerenderPort(portNum);
    }

    /* ══════════════════════════════════════════
       Push to Board
       ══════════════════════════════════════════ */
    async function pushPort(portNum) {
      const st = editState[portNum];
      if (!st) return;

      const btn = event.target;
      btn.disabled = true; btn.textContent = 'Pushing...';

      try {
        const res = await fetch('/api/gcl/push-port', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            port: portNum,
            cycleUs: st.cycleUs,
            entries: st.entries,
            transport: 'eth',
            host: getBoardHost()
          })
        });
        const data = await res.json();

        if (data.success) {
          showToast(`Port ${portNum} configured successfully`, 'ok');
          delete editState[portNum];
          // Re-read board to get updated config
          readBoard();
        } else {
          showToast(`Push failed: ${data.error || data.output || 'Unknown error'}`, 'err');
          btn.disabled = false; btn.textContent = 'Push to Board';
        }
      } catch (e) {
        showToast(`Error: ${e.message}`, 'err');
        btn.disabled = false; btn.textContent = 'Push to Board';
      }
    }

    function showToast(msg, type) {
      const t = document.createElement('div');
      t.className = `toast toast-${type}`;
      t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 4000);
    }

    /* ══════════════════════════════════════════
       Shared Renderers
       ══════════════════════════════════════════ */
    function renderBits(mask, clickable, portNum, entryIdx) {
      let h = '<span class="gate-bits">';
      for (let b = 7; b >= 0; b--) {
        const on = (mask >> b) & 1;
        const cls = on ? 'on' : 'off';
        const click = clickable ? ` clickable" onclick="toggleBit('${portNum}',${entryIdx},${b})` : '"';
        const bg = on ? `background:${TC[b].color}` : '';
        h += `<span class="gate-bit ${cls}${click} style="${bg}" title="${TC[b].name}">${b}</span>`;
      }
      return h + '</span>';
    }

    function tcLabel(mask) {
      if (mask === 255) return '<span style="color:var(--text3)">All Open (Best Effort)</span>';
      const t = [];
      for (let b = 7; b >= 0; b--) if ((mask >> b) & 1) t.push(`<span style="color:${TC[b].color};font-weight:700">${TC[b].name}</span>`);
      return t.join(' ');
    }

    function buildGantt(entries, cycleUs) {
      const ns = 'http://www.w3.org/2000/svg';
      const W = 800, barH = 44, padY = 4, H = barH + padY * 2 + 20;
      const svg = document.createElementNS(ns, 'svg');
      svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
      svg.setAttribute('class', 'gantt-svg');

      const bg = document.createElementNS(ns, 'rect');
      bg.setAttribute('width', W); bg.setAttribute('height', H);
      bg.setAttribute('rx', 12); bg.setAttribute('fill', '#f5f5f7');
      svg.appendChild(bg);

      let x = 0;
      for (const e of entries) {
        const w = (e.durationUs / cycleUs) * W;
        if (w < 0.3) { x += w; continue; }
        const mask = e.gateStates;
        const color = mask === 255 ? BE_COLOR : getColor(mask);

        const rect = document.createElementNS(ns, 'rect');
        rect.setAttribute('x', x + 0.5); rect.setAttribute('y', padY);
        rect.setAttribute('width', Math.max(w - 1, 1)); rect.setAttribute('height', barH);
        rect.setAttribute('rx', w > 8 ? 6 : 2); rect.setAttribute('fill', color);
        svg.appendChild(rect);

        if (w > 28) {
          const lbl = document.createElementNS(ns, 'text');
          lbl.setAttribute('x', x + w/2); lbl.setAttribute('y', padY + barH/2 - 3);
          lbl.setAttribute('text-anchor', 'middle'); lbl.setAttribute('dominant-baseline', 'central');
          lbl.setAttribute('font-family', 'Inter,system-ui'); lbl.setAttribute('font-weight', '700');
          lbl.setAttribute('font-size', w > 50 ? '12' : '9');
          lbl.setAttribute('fill', mask === 255 ? '#aeaeb2' : '#fff');
          lbl.textContent = gLabel(mask);
          svg.appendChild(lbl);

          const dur = document.createElementNS(ns, 'text');
          dur.setAttribute('x', x + w/2); dur.setAttribute('y', padY + barH/2 + 10);
          dur.setAttribute('text-anchor', 'middle');
          dur.setAttribute('font-family', 'Inter,system-ui'); dur.setAttribute('font-size', '9');
          dur.setAttribute('font-weight', '500');
          dur.setAttribute('fill', mask === 255 ? '#c7c7cc' : 'rgba(255,255,255,.7)');
          dur.textContent = `${e.durationUs.toFixed(1)}\u00b5s`;
          svg.appendChild(dur);
        }
        x += w;
      }

      for (let i = 0; i <= 4; i++) {
        const tx = (W * i) / 4;
        const t = ((cycleUs * i) / 4).toFixed(0);
        const m = document.createElementNS(ns, 'text');
        m.setAttribute('x', i === 4 ? tx - 2 : (i === 0 ? tx + 2 : tx));
        m.setAttribute('y', H - 3);
        m.setAttribute('text-anchor', i === 4 ? 'end' : (i === 0 ? 'start' : 'middle'));
        m.setAttribute('font-family', 'Inter,system-ui'); m.setAttribute('font-size', '9');
        m.setAttribute('font-weight', '500'); m.setAttribute('fill', '#aeaeb2');
        m.textContent = `${t}\u00b5s`;
        svg.appendChild(m);
      }
      return svg;
    }

    function getColor(mask) { for (let b = 7; b >= 0; b--) if ((mask >> b) & 1) return TC[b].color; return '#8e8e93'; }
    function gLabel(mask) {
      if (mask === 255) return 'ALL OPEN';
      const t = []; for (let b = 7; b >= 0; b--) if ((mask >> b) & 1) t.push(TC[b].name);
      return t.join('+');
    }
  </script>
</body>
</html>
