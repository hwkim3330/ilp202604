<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KETI TSN — LiDAR Live</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #ffffff; --bg2: #f5f5f7; --bg3: #fafafa;
      --border: rgba(0,0,0,.06); --border-hi: rgba(0,0,0,.12);
      --text: #1d1d1f; --text2: #6e6e73; --text3: #aeaeb2;
      --blue: #007aff; --green: #34c759; --orange: #ff9500; --red: #ff3b30;
      --cyan: #32ade6; --indigo: #5856d6; --purple: #af52de; --yellow: #ffcc00;
      --shadow: 0 1px 3px rgba(0,0,0,.04);
    }
    html, body { height: 100%; overflow: hidden; }
    body { font-family: 'Inter', -apple-system, system-ui, sans-serif; background: var(--bg2); color: var(--text); -webkit-font-smoothing: antialiased; }
    .app { display: grid; grid-template-columns: 1fr 400px; height: 100vh; }

    /* ── Left: 3D ── */
    .canvas-wrap { position: relative; overflow: hidden; background: #0a0a0f; border-right: 1px solid var(--border); }
    #canvas3d { width: 100%; height: 100%; display: block; }
    .hud { position: absolute; top: 12px; left: 16px; right: 16px; display: flex; justify-content: space-between; pointer-events: none; z-index: 5; }
    .hud > * { pointer-events: auto; }
    .hud-title { font-size: 0.88rem; font-weight: 800; color: #fff; letter-spacing: -0.02em; }
    .hud-sub { font-size: 0.62rem; color: rgba(255,255,255,.5); margin-top: 2px; }
    .pills { display: flex; gap: 4px; }
    .pill { display: flex; align-items: center; gap: 4px; background: rgba(255,255,255,.08); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,.1); padding: 4px 10px; border-radius: 100px; font-size: 0.6rem; font-weight: 600; color: #fff; }
    .dot { width: 5px; height: 5px; border-radius: 50%; }
    .dot-on { background: #30d158; box-shadow: 0 0 6px #30d158; }
    .dot-off { background: rgba(255,255,255,.3); }
    .hud-bottom { position: absolute; bottom: 12px; left: 16px; right: 16px; display: flex; justify-content: space-between; pointer-events: none; z-index: 5; }
    .hud-bottom > * { pointer-events: auto; }
    .cbtn { background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.1); color: #fff; padding: 4px 10px; border-radius: 6px; font-size: 0.58rem; font-weight: 600; cursor: pointer; font-family: inherit; }
    .cbtn:hover { background: rgba(255,255,255,.15); }
    .legend { display: flex; gap: 3px; align-items: center; font-size: 0.55rem; color: rgba(255,255,255,.3); }
    .legend-bar { width: 80px; height: 5px; border-radius: 3px; background: linear-gradient(90deg, #0000ff, #00ffff, #00ff00, #ffff00, #ff0000); }

    /* ── Right panel ── */
    .panel { display: flex; flex-direction: column; background: var(--bg); overflow: hidden; }

    /* Nav */
    .pnav { display: flex; align-items: center; padding: 0 16px; height: 40px; border-bottom: 1px solid var(--border); gap: 4px; }
    .pnav a { font-size: 0.6rem; font-weight: 600; color: var(--text3); text-decoration: none; padding: 4px 10px; border-radius: 6px; }
    .pnav a:hover { color: var(--text2); background: var(--bg2); }
    .pnav a.active { color: var(--blue); background: rgba(0,122,255,.06); }
    .pnav-spacer { flex: 1; }
    .pnav-status { font-size: 0.55rem; color: var(--text3); display: flex; align-items: center; gap: 4px; }
    .sdot { width: 5px; height: 5px; border-radius: 50%; background: var(--text3); }
    .sdot.on { background: var(--green); box-shadow: 0 0 4px rgba(52,199,89,.4); }

    /* Topology */
    .topo-section { padding: 12px 16px; border-bottom: 1px solid var(--border); }
    .topo-svg { width: 100%; }
    .sec-title { font-size: 0.52rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text3); margin-bottom: 8px; }

    /* Stats */
    .stats { display: grid; grid-template-columns: repeat(5, 1fr); gap: 1px; background: var(--border); border-bottom: 1px solid var(--border); }
    .st { background: var(--bg); padding: 8px 6px; text-align: center; }
    .st-val { font-size: 1rem; font-weight: 900; font-variant-numeric: tabular-nums; letter-spacing: -0.03em; }
    .st-label { font-size: 0.42rem; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.05em; margin-top: 1px; }

    /* Canvas */
    .scope-wrap { height: 90px; border-bottom: 1px solid var(--border); position: relative; background: var(--bg); }
    .scope-wrap canvas { width: 100%; height: 100%; display: block; }
    .scope-label { position: absolute; top: 4px; left: 8px; font-size: 0.48rem; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 0.05em; }

    /* GCL Editor */
    .gcl-section { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
    .gcl-head { display: flex; align-items: center; padding: 8px 16px; border-bottom: 1px solid var(--border); gap: 6px; }
    .gcl-head h3 { font-size: 0.65rem; font-weight: 700; flex: 1; }
    .mode-tog { display: flex; border-radius: 6px; border: 1px solid var(--border); overflow: hidden; }
    .mode-b { padding: 3px 10px; font-size: 0.55rem; font-weight: 600; border: none; background: var(--bg2); color: var(--text3); cursor: pointer; font-family: inherit; }
    .mode-b.on { background: var(--blue); color: #fff; }

    .gcl-ctrls { padding: 8px 16px; border-bottom: 1px solid var(--border); }
    .cr { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
    .cr:last-child { margin-bottom: 0; }
    .cr-l { font-size: 0.55rem; font-weight: 600; color: var(--text3); width: 48px; }
    .cr-in { width: 70px; padding: 3px 6px; border-radius: 5px; border: 1px solid var(--border); font-size: 0.65rem; font-family: inherit; font-weight: 600; text-align: right; }
    .cr-sl { flex: 1; height: 3px; -webkit-appearance: none; background: var(--bg2); border-radius: 2px; }
    .cr-sl::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; border-radius: 50%; background: var(--blue); cursor: pointer; }
    .cr-v { font-size: 0.6rem; font-weight: 700; width: 40px; text-align: right; }
    .cr-u { font-size: 0.48rem; color: var(--text3); }

    /* GCL table */
    .gcl-tw { flex: 1; overflow-y: auto; }
    .gt { width: 100%; border-collapse: collapse; font-size: 0.6rem; }
    .gt th { text-align: left; padding: 4px 6px; font-size: 0.45rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text3); border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--bg); z-index: 1; }
    .gt td { padding: 4px 6px; border-bottom: 1px solid var(--border); }
    .gbits { display: inline-flex; gap: 1px; }
    .gb { width: 16px; height: 16px; border-radius: 3px; display: inline-flex; align-items: center; justify-content: center; font-size: 0.42rem; font-weight: 700; }
    .gb.on { color: #fff; }
    .gb.off { background: var(--bg2); color: var(--text3); }
    .gb.clk { cursor: pointer; }
    .gb.clk:hover { opacity: .8; transform: scale(1.1); }
    .dur-in { width: 64px; padding: 2px 5px; border-radius: 4px; border: 1px solid var(--border); font-size: 0.62rem; font-family: inherit; font-weight: 600; text-align: right; }
    .btn-x { width: 18px; height: 18px; border-radius: 4px; border: none; background: none; color: var(--text3); cursor: pointer; font-size: 0.65rem; }
    .btn-x:hover { background: rgba(255,59,48,.08); color: var(--red); }
    .btn-add { width: 100%; padding: 4px; border: 1px dashed var(--border); border-radius: 6px; background: none; font-size: 0.55rem; font-weight: 600; color: var(--text3); cursor: pointer; font-family: inherit; margin: 6px 0; }
    .btn-add:hover { border-color: var(--blue); color: var(--blue); }

    /* Gantt */
    .gantt-w { padding: 6px 16px 8px; border-top: 1px solid var(--border); }
    .gantt-bar { width: 100%; height: 28px; border-radius: 8px; overflow: hidden; display: flex; background: var(--bg2); border: 1px solid var(--border); }
    .g-seg { height: 100%; display: flex; align-items: center; justify-content: center; font-size: 0.45rem; font-weight: 700; overflow: hidden; }
    .gantt-info { font-size: 0.52rem; color: var(--text3); margin-top: 4px; text-align: center; }
    .gantt-info strong { color: var(--text2); }
    .gantt-warn { color: var(--red); font-weight: 600; }

    /* Bottom */
    .bot-bar { display: flex; align-items: center; gap: 6px; padding: 8px 16px; border-top: 1px solid var(--border); background: var(--bg); }
    .b-sel { padding: 4px 8px; border-radius: 6px; border: 1px solid var(--border); font-size: 0.58rem; font-family: inherit; background: var(--bg2); color: var(--text2); cursor: pointer; }
    .b-btn { padding: 5px 14px; border-radius: 8px; border: none; font-size: 0.58rem; font-weight: 700; cursor: pointer; font-family: inherit; }
    .b-primary { background: var(--blue); color: #fff; }
    .b-primary:disabled { opacity: .3; cursor: not-allowed; }
    .b-sec { background: var(--bg2); color: var(--text2); border: 1px solid var(--border); }
    .b-sec:hover { border-color: var(--blue); color: var(--blue); }
    .b-spacer { flex: 1; }
    .bench { display: flex; gap: 2px; }
    .bench-i { padding: 2px 8px; background: var(--bg2); border-radius: 4px; text-align: center; }
    .bench-v { font-size: 0.62rem; font-weight: 800; }
    .bench-l { font-size: 0.4rem; color: var(--text3); }

    .toast { position: fixed; bottom: 60px; left: 50%; transform: translateX(-50%); padding: 8px 20px; border-radius: 10px; font-size: 0.68rem; font-weight: 600; z-index: 999; animation: tin .3s; }
    .toast-ok { background: var(--green); color: #fff; }
    .toast-err { background: var(--red); color: #fff; }
    @keyframes tin { from { opacity: 0; transform: translateX(-50%) translateY(8px); } }
  </style>
</head>
<body>
<div class="app">
  <div class="canvas-wrap">
    <canvas id="canvas3d"></canvas>
    <div class="hud">
      <div><div class="hud-title">Ouster OS-1-16</div><div class="hud-sub">Live Point Cloud — <span id="modeText">512×10</span></div></div>
      <div class="pills">
        <div class="pill"><div class="dot" id="cloudDot"></div><span id="cloudSt">—</span></div>
        <div class="pill"><span style="opacity:.5">FPS</span><span id="fpsVal">0</span></div>
        <div class="pill"><span style="opacity:.5">Pts</span><span id="ptsVal">0</span></div>
      </div>
    </div>
    <div class="hud-bottom">
      <div class="legend"><span>Near</span><div class="legend-bar"></div><span>Far</span></div>
      <div style="display:flex;gap:3px">
        <button class="cbtn" onclick="cycleColor()"><span id="colorLbl">Height</span></button>
        <button class="cbtn" onclick="cycleSize()">Size</button>
        <button class="cbtn" onclick="toggleGrid()">Grid</button>
        <button class="cbtn" onclick="resetView()">Reset</button>
      </div>
    </div>
  </div>

  <div class="panel">
    <div class="pnav">
      <a href="/" class="nav-link">Home</a>
      <a href="lidar-timing.html">Editor</a>
      <a href="board.html">Board</a>
      <a href="how-it-works.html">Docs</a>
      <span class="pnav-spacer"></span>
      <div class="pnav-status"><span class="sdot" id="timDot"></span><span id="timSt">—</span></div>
    </div>

    <!-- Topology -->
    <div class="topo-section">
      <div class="sec-title">Network Topology</div>
      <svg class="topo-svg" viewBox="0 0 370 70" id="topoSvg"></svg>
    </div>

    <!-- Stats -->
    <div class="stats">
      <div class="st"><div class="st-val" id="sFps">—</div><div class="st-label">FPS</div></div>
      <div class="st"><div class="st-val" id="sPkt">—</div><div class="st-label">Pkt int µs</div></div>
      <div class="st"><div class="st-val" id="sJit">—</div><div class="st-label">Jitter µs</div></div>
      <div class="st"><div class="st-val" id="sBw">—</div><div class="st-label">Mbps</div></div>
      <div class="st"><div class="st-val" id="sWire">—</div><div class="st-label">Wire µs</div></div>
    </div>

    <!-- Scope -->
    <div class="scope-wrap">
      <div class="scope-label">Packet Arrivals — 500 ms</div>
      <canvas id="cScope"></canvas>
    </div>

    <!-- GCL Editor -->
    <div class="gcl-section">
      <div class="gcl-head">
        <h3>GCL Schedule</h3>
        <div class="mode-tog">
          <button class="mode-b on" id="mAuto" onclick="setMode('auto')">Auto</button>
          <button class="mode-b" id="mCust" onclick="setMode('custom')">Custom</button>
        </div>
      </div>
      <div class="gcl-ctrls">
        <div class="cr">
          <span class="cr-l">Cycle</span>
          <input type="number" class="cr-in" id="cCycle" value="3130" onchange="editCycle(+this.value)">
          <span class="cr-u">µs</span>
          <input type="range" class="cr-sl" id="cCycleSl" min="100" max="10000" value="3130" oninput="editCycle(+this.value)">
        </div>
        <div class="cr">
          <span class="cr-l">Margin</span>
          <input type="range" class="cr-sl" id="cMargin" min="10" max="50" value="20" oninput="editMargin(+this.value/10)">
          <span class="cr-v" id="cMarginV">2.0<span class="cr-u">×</span></span>
        </div>
      </div>
      <div class="gcl-tw">
        <table class="gt"><thead><tr><th>#</th><th>Gate</th><th>TCs</th><th>Duration</th><th></th></tr></thead><tbody id="gBody"></tbody></table>
        <div style="padding:0 6px"><button class="btn-add" onclick="addEntry()">+ Add Entry</button></div>
      </div>
      <div class="gantt-w">
        <div class="gantt-bar" id="ganttBar"></div>
        <div class="gantt-info" id="ganttInfo"></div>
      </div>
    </div>

    <!-- Bottom -->
    <div class="bot-bar">
      <select class="b-sel" id="boardSel"><option value="">Board</option></select>
      <select class="b-sel" id="portSel"><option value="1">P1</option><option value="2">P2</option><option value="both">Both</option></select>
      <button class="b-btn b-primary" id="btnPush" disabled onclick="pushTas()">Push TAS</button>
      <button class="b-btn b-sec" onclick="runBenchmark()">Bench</button>
      <button class="b-btn b-sec" onclick="captureSnapshot()">Save</button>
      <span class="b-spacer"></span>
      <div class="bench" id="benchStrip"></div>
    </div>
  </div>
</div>

<script type="importmap">
{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.167.0/build/three.module.js", "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.167.0/examples/jsm/" } }
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

/* ══════════════════════
   State
   ══════════════════════ */
const TC = [{n:'TC0',c:'#8e8e93'},{n:'TC1',c:'#ff3b30'},{n:'TC2',c:'#34c759'},{n:'TC3',c:'#ff9500'},{n:'TC4',c:'#af52de'},{n:'TC5',c:'#5856d6'},{n:'TC6',c:'#32ade6'},{n:'TC7',c:'#007aff'}];
let config = { boards: [], lidars: [] }, selectedLidar = null;
let profile = null, autoTas = null;
const tPkts = []; const MAX_T = 2000;
let editor = { mode: 'auto', cycleUs: 3130, margin: 2.0, entries: [] };

/* ══════════════════════
   Three.js
   ══════════════════════ */
const canvas = document.getElementById('canvas3d'), wrap = canvas.parentElement;
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setClearColor(0x0a0a0f);
const scene = new THREE.Scene(); scene.fog = new THREE.Fog(0x0a0a0f, 30, 80);
const camera = new THREE.PerspectiveCamera(60, 1, 0.1, 200);
camera.position.set(0, 8, 15);
const ctrl = new OrbitControls(camera, canvas); ctrl.enableDamping = true; ctrl.dampingFactor = 0.08;
const grid = new THREE.GridHelper(40, 40, 0x222233, 0x151520); scene.add(grid);
const ax = new THREE.AxesHelper(2); scene.add(ax);
const MP = 16384, geo = new THREE.BufferGeometry();
const posA = new Float32Array(MP*3), colA = new Float32Array(MP*3);
geo.setAttribute('position', new THREE.BufferAttribute(posA, 3));
geo.setAttribute('color', new THREE.BufferAttribute(colA, 3));
geo.setDrawRange(0, 0);
const mat = new THREE.PointsMaterial({ size: 0.08, vertexColors: true, sizeAttenuation: true, transparent: true, opacity: 0.85 });
scene.add(new THREE.Points(geo, mat));
let colorMode = 0; const cmNames = ['Height','Intensity','Distance'];
let sizeIdx = 1; const sizes = [0.04, 0.08, 0.15, 0.25];
let fc = 0, lfps = performance.now(), dfps = 0;

function cFn(x,y,z,int) {
  if (colorMode===0) { const t=Math.max(0,Math.min(1,(z+3)/8)); return t<.25?[0,t*4,1]:t<.5?[0,1,1-(t-.25)*4]:t<.75?[(t-.5)*4,1,0]:[1,1-(t-.75)*4,0]; }
  if (colorMode===1) { const t=Math.min(1,int/1000); return [t,t*.8,t*.3]; }
  const d=Math.sqrt(x*x+y*y+z*z),t=Math.max(0,Math.min(1,d/30)); return t<.25?[0,t*4,1]:t<.5?[0,1,1-(t-.25)*4]:t<.75?[(t-.5)*4,1,0]:[1,1-(t-.75)*4,0];
}

function updateCloud(data) {
  const n = Math.min(data.length/4, MP), p=geo.getAttribute('position').array, c=geo.getAttribute('color').array;
  for (let i=0;i<n;i++) { const x=data[i*4],y=data[i*4+1],z=data[i*4+2],int=data[i*4+3]; p[i*3]=y;p[i*3+1]=z;p[i*3+2]=-x; const cl=cFn(x,y,z,int);c[i*3]=cl[0];c[i*3+1]=cl[1];c[i*3+2]=cl[2]; }
  geo.getAttribute('position').needsUpdate=true; geo.getAttribute('color').needsUpdate=true;
  geo.setDrawRange(0,n); geo.computeBoundingSphere();
  fc++; const now=performance.now(); if(now-lfps>=1000){dfps=fc;fc=0;lfps=now;}
  document.getElementById('fpsVal').textContent=dfps; document.getElementById('ptsVal').textContent=n.toLocaleString();
}

function resizeR() { const w=wrap.clientWidth,h=wrap.clientHeight; renderer.setPixelRatio(Math.min(devicePixelRatio,2)); renderer.setSize(w,h); camera.aspect=w/h; camera.updateProjectionMatrix(); }
window.addEventListener('resize', resizeR);
window.cycleColor=()=>{colorMode=(colorMode+1)%3;document.getElementById('colorLbl').textContent=cmNames[colorMode];};
window.cycleSize=()=>{sizeIdx=(sizeIdx+1)%sizes.length;mat.size=sizes[sizeIdx];};
window.toggleGrid=()=>{grid.visible=!grid.visible;ax.visible=grid.visible;};
window.resetView=()=>{camera.position.set(0,8,15);camera.lookAt(0,0,0);ctrl.target.set(0,0,0);ctrl.update();};

/* ══════════════════════
   Topology SVG
   ══════════════════════ */
function renderTopo() {
  const svg = document.getElementById('topoSvg');
  const boards = config.boards || [];
  // Nodes: LiDAR -> Switch(es) -> PC
  let html = '';
  // Connection lines
  html += `<line x1="60" y1="35" x2="140" y2="35" stroke="#007aff" stroke-width="2" stroke-dasharray="4,2" opacity=".4"/>`;
  // Board(s)
  const bx = boards.length > 1 ? [140, 200, 260] : [185];
  boards.forEach((b, i) => {
    const x = boards.length > 1 ? 140 + i * 60 : 185;
    if (i > 0) html += `<line x1="${x-60}" y1="35" x2="${x}" y2="35" stroke="#34c759" stroke-width="2" opacity=".3"/>`;
    html += `<line x1="${x}" y1="35" x2="${x + 60}" y2="35" stroke="#34c759" stroke-width="2" opacity=".3"/>`;
    const connected = boardStatus[b.id];
    const col = connected ? '#34c759' : '#aeaeb2';
    html += `<rect x="${x-25}" y="14" width="50" height="42" rx="8" fill="${connected ? 'rgba(52,199,89,.06)' : 'rgba(0,0,0,.02)'}" stroke="${col}" stroke-width="1.5"/>`;
    html += `<text x="${x}" y="31" text-anchor="middle" font-size="8" font-weight="800" fill="${col}">${b.id.replace('SW_','')}</text>`;
    html += `<text x="${x}" y="42" text-anchor="middle" font-size="6" font-weight="500" fill="#aeaeb2">${b.host}</text>`;
    html += `<circle cx="${x+20}" cy="19" r="3" fill="${col}"/>`;
  });
  const lastBx = boards.length > 1 ? 140 + (boards.length-1)*60 : 185;
  // LiDAR
  html += `<rect x="15" y="18" width="44" height="34" rx="8" fill="rgba(0,122,255,.06)" stroke="#007aff" stroke-width="1.5"/>`;
  html += `<text x="37" y="33" text-anchor="middle" font-size="7" font-weight="800" fill="#007aff">LiDAR</text>`;
  html += `<text x="37" y="43" text-anchor="middle" font-size="5" fill="#aeaeb2">UDP :7502</text>`;
  // PC
  const pcx = lastBx + 60;
  html += `<rect x="${pcx-22}" y="18" width="44" height="34" rx="8" fill="rgba(88,86,214,.06)" stroke="#5856d6" stroke-width="1.5"/>`;
  html += `<text x="${pcx}" y="33" text-anchor="middle" font-size="7" font-weight="800" fill="#5856d6">Server</text>`;
  html += `<text x="${pcx}" y="43" text-anchor="middle" font-size="5" fill="#aeaeb2">:3000</text>`;
  svg.innerHTML = html;
}

/* ══════════════════════
   WebSockets
   ══════════════════════ */
let wsC = null, wsT = null;
function connCloud(id) {
  const p = location.protocol==='https:'?'wss:':'ws:';
  wsC = new WebSocket(`${p}//${location.host}/ws/lidar-${id.replace('lidar-','')}`);
  wsC.binaryType='arraybuffer';
  wsC.onopen=()=>{document.getElementById('cloudDot').className='dot dot-on';document.getElementById('cloudSt').textContent='Cloud';};
  wsC.onmessage=(e)=>{if(e.data instanceof ArrayBuffer)updateCloud(new Float32Array(e.data));};
  wsC.onclose=()=>{document.getElementById('cloudDot').className='dot dot-off';document.getElementById('cloudSt').textContent='Off';setTimeout(()=>connCloud(id),2000);};
  wsC.onerror=()=>wsC.close();
}
function connTiming(id) {
  const p = location.protocol==='https:'?'wss:':'ws:';
  wsT = new WebSocket(`${p}//${location.host}/ws/lidar-timing-${id.replace('lidar-','')}`);
  wsT.onopen=()=>{document.getElementById('timDot').className='sdot on';document.getElementById('timSt').textContent='Live';};
  wsT.onmessage=(e)=>{const m=JSON.parse(e.data);if(m.type==='pkt'){tPkts.push(m);if(tPkts.length>MAX_T)tPkts.shift();}else if(m.type==='profile'){profile=m.profile;autoTas=m.autoTas;updateUI();}};
  wsT.onclose=()=>{document.getElementById('timDot').className='sdot';document.getElementById('timSt').textContent='Off';setTimeout(()=>connTiming(id),2000);};
  wsT.onerror=()=>wsT.close();
}

/* ══════════════════════
   UI Updates
   ══════════════════════ */
function updateUI() {
  if (!profile) return;
  document.getElementById('sFps').textContent = profile.fps;
  document.getElementById('sPkt').textContent = profile.pktIntervalUs.toLocaleString();
  document.getElementById('sJit').textContent = profile.jitterUs;
  document.getElementById('sBw').textContent = profile.bandwidthMbps;
  if (autoTas && !autoTas.error) {
    document.getElementById('sWire').textContent = autoTas.pktTxUs;
    if (editor.mode === 'auto') syncAuto();
  }
}

/* ══════════════════════
   GCL Editor
   ══════════════════════ */
window.setMode = (m) => {
  editor.mode = m;
  document.getElementById('mAuto').className = 'mode-b' + (m==='auto'?' on':'');
  document.getElementById('mCust').className = 'mode-b' + (m==='custom'?' on':'');
  if (m==='auto' && autoTas) syncAuto();
  upPush();
};

function syncAuto() {
  if (!autoTas || autoTas.error) return;
  editor.cycleUs = autoTas.cycleUs;
  editor.entries = autoTas.entries.map(e => ({ gs: e.gateStates, dur: e.durationUs }));
  document.getElementById('cCycle').value = editor.cycleUs;
  document.getElementById('cCycleSl').value = Math.min(10000, editor.cycleUs);
  renderGcl();
}

window.editCycle = (v) => { v=Math.max(10,Math.round(v)); editor.cycleUs=v; editor.mode='custom'; setMode('custom'); document.getElementById('cCycle').value=v; document.getElementById('cCycleSl').value=Math.min(10000,v); recalcBE(); renderGcl(); };
window.editMargin = (v) => { editor.margin=Math.round(v*10)/10; document.getElementById('cMarginV').innerHTML=`${editor.margin.toFixed(1)}<span class="cr-u">×</span>`; if(editor.mode==='auto'&&autoTas){const w=autoTas.pktTxUs||27.44;if(editor.entries.length)editor.entries[0].dur=Math.round(w*editor.margin*10)/10;recalcBE();}renderGcl(); };
window.editDur = (i,v) => { editor.mode='custom'; setMode('custom'); editor.entries[i].dur=Math.max(0.1,parseFloat(v)||0); renderGcl(); };
window.togBit = (i,b) => { editor.mode='custom'; setMode('custom'); editor.entries[i].gs^=(1<<b); renderGcl(); };
window.addEntry = () => { editor.mode='custom'; setMode('custom'); const u=editor.entries.reduce((s,e)=>s+e.dur,0); editor.entries.push({gs:255,dur:Math.max(1,Math.round((editor.cycleUs-u)*10)/10)}); renderGcl(); };
window.rmEntry = (i) => { if(editor.entries.length<=1)return; editor.mode='custom'; setMode('custom'); editor.entries.splice(i,1); recalcBE(); renderGcl(); };

function recalcBE() { if(editor.entries.length<2)return; const li=editor.entries.length-1; const os=editor.entries.slice(0,li).reduce((s,e)=>s+e.dur,0); editor.entries[li].dur=Math.round((editor.cycleUs-os)*10)/10; }

function renderGcl() {
  // Table
  document.getElementById('gBody').innerHTML = editor.entries.map((e,i) => {
    let bits='<span class="gbits">';
    for(let b=7;b>=0;b--){const on=(e.gs>>b)&1;bits+=`<span class="gb ${on?'on':'off'}${editor.mode==='custom'?' clk':''}" style="${on?'background:'+TC[b].c:''}" ${editor.mode==='custom'?`onclick="togBit(${i},${b})"`:''} title="${TC[b].n}">${b}</span>`;}
    bits+='</span>';
    const tcs = e.gs===255?'<span style="color:var(--text3)">All</span>':e.gs===0?'<span style="color:var(--orange)">Guard</span>':Array.from({length:8},(_,b)=>7-b).filter(b=>(e.gs>>b)&1).map(b=>`<span style="color:${TC[b].c};font-weight:700">${TC[b].n}</span>`).join(' ');
    return `<tr><td style="color:var(--text3);font-weight:700">${i}</td><td>${bits}</td><td>${tcs}</td><td><input type="number" class="dur-in" value="${e.dur}" step="0.1" onchange="editDur(${i},this.value)" ${editor.mode==='auto'?'disabled':''}></td><td>${editor.entries.length>1?`<button class="btn-x" onclick="rmEntry(${i})">×</button>`:''}</td></tr>`;
  }).join('');

  // Gantt
  const total = editor.entries.reduce((s,e)=>s+e.dur,0);
  document.getElementById('ganttBar').innerHTML = editor.entries.map(e => {
    const pct = e.dur / editor.cycleUs * 100;
    let bg = 'rgba(0,0,0,.02)';
    if (e.gs===128) bg='rgba(0,122,255,.15)'; else if(e.gs===0) bg='rgba(255,204,0,.12)'; else if(e.gs!==255&&e.gs!==127) bg=TC.find((_,b)=>(e.gs>>(7-b))&1)?.c+'22'||'rgba(0,0,0,.03)';
    const lbl = pct>4 ? (e.gs===128?'TC7':e.gs===127?'BE':e.gs===0?'G':e.gs===255?'ALL':'') : '';
    return `<div class="g-seg" style="flex:${pct};background:${bg};color:var(--text3)">${lbl}</div>`;
  }).join('');

  const diff = Math.round((total - editor.cycleUs)*10)/10;
  const gi = document.getElementById('ganttInfo');
  if (Math.abs(diff)<0.2) gi.innerHTML=`Cycle <strong>${editor.cycleUs} µs</strong> &middot; ${editor.entries.length} entries &middot; TC7 ${editor.entries[0]?.dur||'—'} µs`;
  else gi.innerHTML=`<span class="gantt-warn">Total ${total.toFixed(1)} µs ≠ cycle ${editor.cycleUs} µs (${diff>0?'+':''}${diff})</span>`;
  upPush();
}

function upPush() { document.getElementById('btnPush').disabled = !document.getElementById('boardSel').value || !editor.entries.length; }

/* ══════════════════════
   Board Status + Actions
   ══════════════════════ */
let boardStatus = {};

async function checkBoards() {
  try {
    const r = await fetch('/api/boards/status'); const bs = await r.json();
    for (const b of bs) boardStatus[b.id] = b.connected;
    renderTopo();
  } catch {}
}

function getBoardHost() { const id=document.getElementById('boardSel').value; return config.boards.find(b=>b.id===id)?.host; }

window.pushTas = async () => {
  const boardId=document.getElementById('boardSel').value, portVal=document.getElementById('portSel').value, host=getBoardHost();
  if(!boardId||!host)return;
  const btn=document.getElementById('btnPush'); btn.disabled=true; btn.textContent='...';
  const ports=portVal==='both'?['1','2']:[portVal];
  const entries=editor.entries.map(e=>({gateStates:e.gs,durationUs:e.dur}));
  try {
    for(const port of ports){const r=await fetch('/api/gcl/push-port',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({port,cycleUs:editor.cycleUs,entries,transport:'eth',host})}); const d=await r.json(); if(!d.success)throw new Error(`P${port}: ${d.error||d.output}`);}
    toast(`TAS → ${boardId} (${ports.join('+')})`, 'ok');
    btn.textContent='✓'; setTimeout(()=>{btn.textContent='Push TAS';btn.disabled=false;},2000);
  } catch(e){ toast(e.message,'err'); btn.textContent='Push TAS'; btn.disabled=false; }
};

window.runBenchmark = async () => {
  if(!selectedLidar)return;
  const boardId=document.getElementById('boardSel').value; if(!boardId){toast('Select board','err');return;}
  const port=document.getElementById('portSel').value==='both'?'1':document.getElementById('portSel').value;
  try {
    const r=await fetch(`/api/lidar/benchmark/${selectedLidar.id}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({boardId,port,transport:'eth'})});
    const d=await r.json(); if(d.error){toast(d.error,'err');return;}
    const t=d.timings;
    document.getElementById('benchStrip').innerHTML=`<div class="bench-i"><div class="bench-v" style="color:var(--blue)">${t.boardPushMs}</div><div class="bench-l">Push ms</div></div><div class="bench-i"><div class="bench-v" style="color:var(--green)">${t.totalMs}</div><div class="bench-l">Total</div></div>`;
    toast(`${t.totalMs}ms`, 'ok');
  } catch(e){toast(e.message,'err');}
};

window.captureSnapshot = async () => {
  if(!selectedLidar)return;
  try{const r=await fetch(`/api/lidar/capture/${selectedLidar.id}`,{method:'POST'});const d=await r.json();toast(d.saved?`Saved: ${d.saved}`:(d.error||'No data'),d.saved?'ok':'err');}catch(e){toast(e.message,'err');}
};

function toast(msg,type){const t=document.createElement('div');t.className=`toast toast-${type}`;t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),3500);}

/* ══════════════════════
   Canvas Drawing
   ══════════════════════ */
function getCtx(id){const c=document.getElementById(id);const dpr=Math.min(devicePixelRatio,2);const r=c.getBoundingClientRect();c.width=r.width*dpr;c.height=r.height*dpr;const x=c.getContext('2d');x.scale(dpr,dpr);return{x,w:r.width,h:r.height};}

function drawScope(){
  const{x,w,h}=getCtx('cScope');x.clearRect(0,0,w,h);
  if(tPkts.length<2)return;
  const win=500000,now=tPkts[tPkts.length-1].t,start=now-win;
  const top=16,bot=10; let tog=false;
  for(const p of tPkts){if(p.t<start)continue;if(p.newFrame)tog=!tog;if(tog){const px=(p.t-start)/win*w;x.fillStyle='rgba(0,122,255,.04)';x.fillRect(px,top,2,h-top-bot);}}
  for(const p of tPkts){if(p.t<start)continue;const px=(p.t-start)/win*w;const int=Math.min(1,p.pts/16);
    if(p.newFrame){x.strokeStyle='rgba(50,173,230,.2)';x.lineWidth=0.5;x.beginPath();x.moveTo(px,top);x.lineTo(px,h-bot);x.stroke();}
    const bh=3+int*(h-top-bot-6);x.fillStyle=`rgba(0,122,255,${0.15+int*0.5})`;x.fillRect(px,h-bot-bh,1.5,bh);}
  x.fillStyle='rgba(0,0,0,.15)';x.font='7px Inter';
  for(let i=0;i<=5;i++)x.fillText(`${i*100}ms`,(i/5)*w+2,h-1);
}

function renderLoop(){requestAnimationFrame(renderLoop);drawScope();}

/* ══════════════════════
   Init
   ══════════════════════ */
async function init(){
  try{config=await(await fetch('/api/config')).json();}catch{}
  if(!config.lidars.length)config.lidars=[{id:'lidar-a',label:'Ouster A',udpPort:7502}];
  selectedLidar=config.lidars[0];
  const bs=document.getElementById('boardSel');
  config.boards.forEach(b=>{const o=document.createElement('option');o.value=b.id;o.textContent=`${b.id} (${b.host})`;bs.appendChild(o);});
  bs.addEventListener('change',()=>{upPush();checkBoards();});
  renderTopo();
  checkBoards();
  setInterval(checkBoards, 15000);
  connCloud(selectedLidar.id);
  connTiming(selectedLidar.id);
  resizeR();
  animate();
  function animate(){requestAnimationFrame(animate);ctrl.update();renderer.render(scene,camera);}
  renderLoop();
  renderGcl();
}
init();
</script>
